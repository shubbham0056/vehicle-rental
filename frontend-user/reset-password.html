<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — RentWheels</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="logo" onclick="location.href='index.html'">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
    RentWheels<span class="logo-dot">.</span>
  </div>
</nav>

<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:2rem;">
  <div style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem 2rem;width:100%;max-width:420px;box-shadow:var(--shadow-md);">

    <!-- Reset form (shown when token is present) -->
    <div id="resetForm">
      <div style="margin-bottom:1.5rem;">
        <h2 style="font-size:1.375rem;font-weight:700;letter-spacing:-0.02em;margin-bottom:0.375rem;">Set a new password</h2>
        <p style="color:var(--muted);font-size:0.875rem;">Enter your new password below.</p>
      </div>

      <div class="form-group" style="margin-bottom:1rem;">
        <label>New password</label>
        <input type="password" id="newPassword" placeholder="At least 6 characters" />
      </div>
      <div class="form-group" style="margin-bottom:1.5rem;">
        <label>Confirm new password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat your password" />
      </div>

      <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="handleReset()">
        Reset password
      </button>
    </div>

    <!-- Success state -->
    <div id="successState" style="display:none;text-align:center;">
      <div style="width:52px;height:52px;background:#dcfce7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h3 style="font-size:1.125rem;font-weight:700;margin-bottom:0.5rem;">Password updated!</h3>
      <p style="color:var(--muted);font-size:0.875rem;margin-bottom:1.5rem;">Your password has been reset successfully. You can now sign in.</p>
      <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="location.href='index.html'">
        Go to sign in
      </button>
    </div>

    <!-- Invalid token state -->
    <div id="errorState" style="display:none;text-align:center;">
      <div style="width:52px;height:52px;background:#fee2e2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
      <h3 style="font-size:1.125rem;font-weight:700;margin-bottom:0.5rem;">Link invalid or expired</h3>
      <p style="color:var(--muted);font-size:0.875rem;margin-bottom:1.5rem;">This reset link has expired or already been used. Please request a new one.</p>
      <button class="btn btn-outline" style="width:100%;justify-content:center;" onclick="location.href='index.html'">
        Back to home
      </button>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/app.js"></script>
<script>
  const token = new URLSearchParams(location.search).get("token");

  // If no token in URL, show error state immediately
  if (!token) {
    document.getElementById("resetForm").style.display = "none";
    document.getElementById("errorState").style.display = "block";
  }

  async function handleReset() {
    const password = document.getElementById("newPassword").value.trim();
    const confirm  = document.getElementById("confirmPassword").value.trim();

    if (!password || !confirm) { showToast("Please fill in both fields.", "error"); return; }
    if (password.length < 6)   { showToast("Password must be at least 6 characters.", "error"); return; }
    if (password !== confirm)  { showToast("Passwords do not match.", "error"); return; }

    try {
      const res  = await fetch(`/api/auth/reset-password/${token}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password }),
      });
      const data = await res.json();

      if (!res.ok) {
        document.getElementById("resetForm").style.display = "none";
        document.getElementById("errorState").style.display = "block";
        return;
      }

      document.getElementById("resetForm").style.display = "none";
      document.getElementById("successState").style.display = "block";
    } catch {
      showToast("Could not connect to server. Please try again.", "error");
    }
  }
</script>
</body>
</html>
