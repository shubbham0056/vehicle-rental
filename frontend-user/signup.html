<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — RentWheels</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); }

    .login-card {
      background: #fff; border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow-md);
      padding: 2.5rem 2rem; width: 100%; max-width: 420px;
    }

    .login-logo {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 1.25rem; font-weight: 700; color: var(--text);
      margin-bottom: 2rem; justify-content: center;
    }
    .login-logo svg { color: var(--accent); }
    .login-logo span { color: var(--accent); }

    .login-title { font-size: 1.375rem; font-weight: 700; text-align: center; margin-bottom: 0.375rem; }
    .login-sub   { font-size: 0.875rem; color: var(--muted); text-align: center; margin-bottom: 1.75rem; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.8125rem; font-weight: 500; margin-bottom: 0.4rem; color: var(--text); }
    .form-group input {
      width: 100%; padding: 0.625rem 0.875rem;
      border: 1px solid var(--border); border-radius: var(--radius);
      font-size: 0.875rem; font-family: inherit; color: var(--text);
      background: #fff; outline: none; transition: border-color 0.15s;
      box-sizing: border-box;
    }
    .form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }

    .error-msg {
      background: #fef2f2; border: 1px solid #fecaca;
      color: #dc2626; font-size: 0.8125rem;
      padding: 0.625rem 0.875rem; border-radius: var(--radius);
      margin-bottom: 1rem; display: none;
    }
    .error-msg.show { display: block; }

    .btn-login {
      width: 100%; padding: 0.7rem;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius);
      font-size: 0.9375rem; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: background 0.15s; margin-top: 0.25rem;
    }
    .btn-login:hover { background: #1d4ed8; }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    .login-footer { text-align: center; margin-top: 1.5rem; font-size: 0.8125rem; color: var(--muted); }
    .login-footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .login-footer a:hover { text-decoration: underline; }

    .back-home {
      display: flex; align-items: center; justify-content: center;
      gap: 0.3rem; margin-top: 1.25rem;
      font-size: 0.8125rem; color: var(--muted); text-decoration: none;
    }
    .back-home:hover { color: var(--accent); }
  </style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
    RentWheels<span>.</span>
  </div>

  <div class="login-title">Create your account</div>
  <div class="login-sub">Join thousands of happy customers</div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="form-row">
    <div class="form-group"><label>First name</label><input type="text" id="firstName" placeholder="John" /></div>
    <div class="form-group"><label>Last name</label><input type="text" id="lastName" placeholder="Doe" /></div>
  </div>
  <div class="form-group">
    <label>Email address</label>
    <input type="email" id="email" placeholder="you@example.com" />
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Create a password" />
  </div>

  <button class="btn-login" id="signupBtn" onclick="handleSignup()">Create account</button>

  <div class="login-footer">
    Already have an account? <a href="login.html">Sign in</a>
  </div>

  <a href="index.html" class="back-home">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Back to home
  </a>
</div>

<div class="toast" id="toast"></div>

<script>
  function showError(msg) {
    const el = document.getElementById("errorMsg");
    el.textContent = msg;
    el.classList.add("show");
  }

  function hideError() { document.getElementById("errorMsg").classList.remove("show"); }

  function showToast(msg, type = "success") {
    const t = document.getElementById("toast");
    t.className = `toast ${type}`;
    t.innerHTML = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 3000);
  }

  async function handleSignup() {
    hideError();
    const firstName = document.getElementById("firstName").value.trim();
    const lastName  = document.getElementById("lastName").value.trim();
    const email     = document.getElementById("email").value.trim();
    const password  = document.getElementById("password").value.trim();

    if (!firstName || !lastName || !email || !password) { showError("Please fill in all fields."); return; }

    const btn = document.getElementById("signupBtn");
    btn.disabled = true;
    btn.textContent = "Creating account...";

    try {
      const res  = await fetch("/api/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: `${firstName} ${lastName}`, email, password, role: "user" }),
      });
      const data = await res.json();
      if (!res.ok) { showError(data.msg || "Registration failed."); return; }

      showToast("Account created! Redirecting to login...");
      setTimeout(() => window.location.href = "login.html", 1500);
    } catch {
      showError("Could not connect to server.");
    } finally {
      btn.disabled = false;
      btn.textContent = "Create account";
    }
  }

  document.addEventListener("keydown", e => { if (e.key === "Enter") handleSignup(); });
</script>
</body>
</html>
